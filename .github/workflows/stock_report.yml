name: Stock Market Report

on:
  schedule:
    # 08:00 ora italiana = 06:00 UTC (estate CEST, UTC+2)
    # Martedì–Sabato: report giornaliero del giorno precedente
    - cron: '0 6 * * 2-6'
    # Lunedì: report settimanale della settimana precedente
    - cron: '0 6 * * 1'
    # 1°, 2° e 3° di ogni mese per il report mensile
    - cron: '0 6 1-3 * *'
  workflow_dispatch:

jobs:
  send-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install --no-cache-dir yfinance pandas requests lxml html5lib beautifulsoup4

      - name: Verifica versione script
        run: |
          echo "=== VERIFICA ==="
          grep -n "Report Quotidiano\|color:#ffffff\|font-weight:600" stock_report.py | head -5
          echo "================"

      - name: Run stock report
        env:
          EMAIL_MITTENTE:     ${{ secrets.EMAIL_MITTENTE }}
          APP_PASSWORD:       ${{ secrets.APP_PASSWORD }}
          EMAIL_DESTINATARIO: ${{ secrets.EMAIL_DESTINATARIO }}
        run: python stock_report.py
